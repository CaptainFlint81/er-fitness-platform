<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Community learning network</title>
  <desc id="desc">A dark network of community learning nodes for posts, blogs, media, groups, and review.</desc>
  <rect width="960" height="540" fill="#08090b"/>
  <rect x="48" y="48" width="864" height="444" rx="28" fill="#12161b" stroke="#2b3138" stroke-width="3"/>
  <g stroke="#33404a" stroke-width="5">
